[workspace]
resolver = "2"

members = [
    # Libraries
    "crates/floresta",
    "crates/floresta-node",
    "crates/floresta-chain",
    "crates/floresta-rpc",
    "crates/floresta-common",
    "crates/floresta-compact-filters",
    "crates/floresta-electrum",
    "crates/floresta-watch-only",
    "crates/floresta-wire",

    # Binaries
    "bin/florestad",
    "bin/floresta-cli",

    # Tests and monitoring
    "metrics",
    "fuzz",
]

default-members = [
    "crates/floresta",
    "crates/floresta-node",
    "crates/floresta-chain",
    "crates/floresta-rpc",
    "crates/floresta-common",
    "crates/floresta-compact-filters",
    "crates/floresta-electrum",
    "crates/floresta-watch-only",
    "crates/floresta-wire",
    "bin/florestad",
    "bin/floresta-cli",
]

[workspace.package]
readme = "README.md"

[workspace.dependencies]
anyhow = "1.0.40"
axum = "0.7"
bitcoin = { version = "0.32" }
bitcoinconsensus = { version = "0.106.0", default-features = false }
clap = { version = "4.0.29", features = ["derive"] }
dns-lookup = "2.0.4"
kv = "0.24.0"
log = "0.4"
miniscript = "12"
rcgen = "0.13.2"
rustreexo = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = { version = "0.10.6", default-features = false }
spin = "0.9.8"
tokio = { version = "1", features = ["full"] }
tokio-rustls = "0.26"
